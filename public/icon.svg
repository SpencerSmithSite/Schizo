<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cork board background -->
  <rect width="512" height="512" rx="80" fill="#c8a96e"/>
  <!-- Cork texture overlay (subtle grid) -->
  <rect width="512" height="512" rx="80" fill="url(#grain)" opacity="0.12"/>
  <defs>
    <pattern id="grain" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#5a3e1b"/>
      <circle cx="6" cy="6" r="0.8" fill="#5a3e1b"/>
    </pattern>
  </defs>
  <!-- Note card 1 (yellow, slightly rotated) -->
  <g transform="rotate(-8 180 200)">
    <rect x="90" y="130" width="160" height="140" rx="4" fill="#fef08a" filter="url(#shadow)"/>
    <line x1="120" y1="165" x2="220" y2="165" stroke="#ccc" stroke-width="2"/>
    <line x1="120" y1="185" x2="220" y2="185" stroke="#ccc" stroke-width="2"/>
    <line x1="120" y1="205" x2="200" y2="205" stroke="#ccc" stroke-width="2"/>
  </g>
  <!-- Note card 2 (white/pink, rotated other way) -->
  <g transform="rotate(6 340 260)">
    <rect x="265" y="190" width="140" height="115" rx="4" fill="#fce7f3" filter="url(#shadow)"/>
    <line x1="290" y1="220" x2="375" y2="220" stroke="#ccc" stroke-width="2"/>
    <line x1="290" y1="240" x2="375" y2="240" stroke="#ccc" stroke-width="2"/>
  </g>
  <!-- Red pushpin on card 1 -->
  <circle cx="170" cy="130" r="10" fill="#ef4444" filter="url(#shadow)"/>
  <circle cx="170" cy="127" r="5" fill="#fca5a5"/>
  <!-- Red pushpin on card 2 -->
  <circle cx="335" cy="190" r="9" fill="#ef4444" filter="url(#shadow)"/>
  <circle cx="335" cy="187" r="4.5" fill="#fca5a5"/>
  <!-- String connecting the cards -->
  <path d="M 170 140 Q 252 300 335 200" stroke="#b45309" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
</svg>
